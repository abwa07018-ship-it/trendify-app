name: trendify
description: "Trendify — Short-video platform with AI Style Transfer trend filters"
publish_to: 'none'
version: 1.0.0-beta.1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  video_player: ^2.8.1
  tflite_flutter: ^0.10.4
  image: ^4.1.3
  http: ^1.1.0
  provider: ^6.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  cached_network_image: ^3.3.0
  share_plus: ^7.2.1
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.3
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/models/
